- type: custom-api
  cache: 1h
  title: Internet Speed
  options:
    showPercentageDiff: true
    showUnit: true
    showLastTest: false
    showRelativeTime: false
  template: |
    {{ $showPercentage := .Options.BoolOr "showPercentageDiff" true }}
    {{ $showUnit := .Options.BoolOr "showUnit" true }}
    {{ $showLastTest := .Options.BoolOr "showLastTest" false }}
    {{ $showRelativeTime := .Options.BoolOr "showRelativeTime" false }}
    {{ $latestResponse := newRequest "${MYSPEED_URL}/api/speedtests?limit=1" | getResponse }}
    {{ $latestStatus := 0 }}
    {{ with $latestResponse.Response }}{{ $latestStatus = .StatusCode }}{{ end }}

    {{ if ne $latestStatus 200 }}
    <div class="text-center margin-block-3">
      <div class="color-negative size-h4">MySpeed unavailable</div>
      <div class="color-base size-h6">The latest speedtest data could not be loaded.</div>
      {{ if gt $latestStatus 0 }}
      <div class="color-base size-h6">HTTP {{ $latestStatus }}</div>
      {{ end }}
    </div>
    {{ else }}
    {{ $latestItems := $latestResponse.JSON.Array "" }}
    {{ if eq (len $latestItems) 0 }}
    <div class="text-center margin-block-3">
      <div class="color-primary size-h4">No speedtests yet</div>
      <div class="color-base size-h6">Run a test in MySpeed and the latest result will appear here.</div>
    </div>
    {{ else }}
    {{ $latest := index $latestItems 0 }}
    {{ $lastTestRaw := $latest.String "created" }}
    {{ if eq $lastTestRaw "" }}{{ $lastTestRaw = $latest.String "created_at" }}{{ end }}
    {{ if eq $lastTestRaw "" }}{{ $lastTestRaw = $latest.String "createdAt" }}{{ end }}
    {{ if eq $lastTestRaw "" }}{{ $lastTestRaw = $latest.String "timestamp" }}{{ end }}
    {{ $statsResponse := newRequest "${MYSPEED_URL}/api/speedtests/statistics" | getResponse }}
    {{ $statsStatus := 0 }}
    {{ with $statsResponse.Response }}{{ $statsStatus = .StatusCode }}{{ end }}
    {{ $hasStats := eq $statsStatus 200 }}
    <div class="flex justify-between text-center margin-block-3">
      <div>
        {{ if and $showPercentage $hasStats }}
        {{ $downloadChange := percentChange ($latest.Float "download") ($statsResponse.JSON.Float "download.avg") }}
        <div class="size-small {{ if gt $downloadChange 0.0 }}color-positive{{ else if lt $downloadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
          {{ $downloadChange | printf "%+.1f%%" }}
          {{ if gt $downloadChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
          </svg>
          {{ else if lt $downloadChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
          </svg>
          {{ end }}
        </div>
        {{ end }}
        <div class="color-highlight size-h3">{{ $latest.Float "download" | printf "%.1f" }}{{ if $showUnit }}<span class="color-base" style="font-size: 0.7em; margin-left: 0.2em; vertical-align: baseline;">Mbit/s</span>{{ end }}</div>
        <div class="size-h6">DOWNLOAD</div>
      </div>
      <div>
        {{ if and $showPercentage $hasStats }}
        {{ $uploadChange := percentChange ($latest.Float "upload") ($statsResponse.JSON.Float "upload.avg") }}
        <div class="size-small {{ if gt $uploadChange 0.0 }}color-positive{{ else if lt $uploadChange 0.0 }}color-negative{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
          {{ $uploadChange | printf "%+.1f%%" }}
          {{ if gt $uploadChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
          </svg>
          {{ else if lt $uploadChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
          </svg>
          {{ end }}
        </div>
        {{ end }}
        <div class="color-highlight size-h3">{{ $latest.Float "upload" | printf "%.1f" }}{{ if $showUnit }}<span class="color-base" style="font-size: 0.7em; margin-left: 0.2em; vertical-align: baseline;">Mbit/s</span>{{ end }}</div>
        <div class="size-h6">UPLOAD</div>
      </div>
      <div>
        {{ if and $showPercentage $hasStats }}
        {{ $pingChange := percentChange ($latest.Float "ping") ($statsResponse.JSON.Float "ping.avg") }}
        <div class="size-small {{ if gt $pingChange 0.0 }}color-negative{{ else if lt $pingChange 0.0 }}color-positive{{ else }}color-primary{{ end }}" style="display: inline-flex; align-items: center;">
          {{ $pingChange | printf "%+.1f%%" }}
          {{ if lt $pingChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M1.22 4.22a.75.75 0 0 1 1.06 0L6 7.94l2.761-2.762a.75.75 0 0 1 1.158.12 24.9 24.9 0 0 1 2.718 5.556l.729-1.261a.75.75 0 0 1 1.299.75l-1.591 2.755a.75.75 0 0 1-1.025.275l-2.756-1.591a.75.75 0 1 1 .75-1.3l1.097.634a23.417 23.417 0 0 0-1.984-4.211L6.53 9.53a.75.75 0 0 1-1.06 0L1.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
          </svg>
          {{ else if gt $pingChange 0.0 }}
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 1em; margin-left: 0.25em;" class="size-4">
            <path fill-rule="evenodd" d="M9.808 4.057a.75.75 0 0 1 .92-.527l3.116.849a.75.75 0 0 1 .528.915l-.823 3.121a.75.75 0 0 1-1.45-.382l.337-1.281a23.484 23.484 0 0 0-3.609 3.056.75.75 0 0 1-1.07.01L6 8.06l-3.72 3.72a.75.75 0 1 1-1.06-1.061l4.25-4.25a.75.75 0 0 1 1.06 0l1.756 1.755a25.015 25.015 0 0 1 3.508-2.85l-1.46-.398a.75.75 0 0 1-.526-.92Z" clip-rule="evenodd" />
          </svg>
          {{ end }}
        </div>
        {{ end }}
        <div class="color-highlight size-h3">{{ $latest.Float "ping" | printf "%.0f" }}{{ if $showUnit }}<span class="color-base" style="font-size: 0.7em; margin-left: 0.2em; vertical-align: baseline;">ms</span>{{ else }} ms{{ end }}</div>
        <div class="size-h6">PING</div>
      </div>
    </div>
    {{ if and $showPercentage (not $hasStats) }}
    <div class="text-center">
      <div class="color-base size-h6">Average comparison is currently unavailable.</div>
    </div>
    {{ end }}
    {{ if and $showLastTest (ne $lastTestRaw "") }}
    {{ $lastTest := $lastTestRaw | parseTime "rfc3339" }}
    {{ $lastTestLocal := $lastTest.In now.Location }}
    {{ $lastTestDate := $lastTestLocal | formatTime "2006-01-02" }}
    {{ $todayDate := now | formatTime "2006-01-02" }}
    {{ $yesterdayDate := offsetNow "-24h" | formatTime "2006-01-02" }}
    <div class="flex justify-center margin-top-10">
      <div class="size-h6 color-base" style="display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.8rem; border-radius: 999px; background: rgba(127, 127, 127, 0.12); line-height: 1; white-space: nowrap;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="height: 0.95em; opacity: 0.8;" class="size-4">
          <path fill-rule="evenodd" d="M8 1.75a6.25 6.25 0 1 0 0 12.5 6.25 6.25 0 0 0 0-12.5ZM.25 8a7.75 7.75 0 1 1 15.5 0A7.75 7.75 0 0 1 .25 8ZM8.75 4.5a.75.75 0 0 0-1.5 0V8c0 .199.079.39.22.53l2.25 2.25a.75.75 0 1 0 1.06-1.06L8.75 7.69V4.5Z" clip-rule="evenodd" />
        </svg>
        <span class="color-primary">Last test:</span>
        <span class="color-highlight">
          {{ if eq $lastTestDate $todayDate }}
          {{ $lastTestLocal | formatTime "15:04" }}
          {{ else if eq $lastTestDate $yesterdayDate }}
          yesterday {{ $lastTestLocal | formatTime "15:04" }}
          {{ else }}
          {{ $lastTestLocal | formatTime "02.01. 15:04" }}
          {{ end }}
        </span>
        {{ if $showRelativeTime }}
        <span style="opacity: 0.45;">&middot;</span>
        <span><span {{ $lastTestLocal | toRelativeTime }}></span> ago</span>
        {{ end }}
      </div>
    </div>
    {{ end }}
    {{ end }}
    {{ end }}
